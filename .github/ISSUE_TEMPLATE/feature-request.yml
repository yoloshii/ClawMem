name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Describe the use case.
      placeholder: I often need to... but currently ClawMem...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
      placeholder: |
        A new CLI command `clawmem foo` that...
        Or a new MCP tool `bar` that...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or workarounds you're using.
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of ClawMem would this affect?
      options:
        - CLI
        - MCP Server
        - Indexing / Watcher
        - Search / Retrieval
        - Hooks (Claude Code)
        - OpenClaw Plugin
        - Embedding
        - Graph / A-MEM
        - REST API
        - Configuration
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been requested
          required: true
